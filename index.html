<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — AI Equity Research Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #070b12;
  --bg2:       #0a0e17;
  --surface:   #0f1623;
  --surface2:  #141d2e;
  --surface3:  #1a2540;
  --border:    #1e2d45;
  --border2:   #253550;
  --accent:    #00d4aa;
  --accent2:   #0091ff;
  --green:     #22c55e;
  --red:       #ef4444;
  --gold:      #f59e0b;
  --purple:    #a855f7;
  --text:      #dce8f5;
  --text2:     #8faabf;
  --text3:     #4a6580;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --serif:     'DM Serif Display', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── LANDING SCREEN ── */
#landingScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.bg-glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,145,255,0.05) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none;
}
.bg-glow2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}

.logo-wrap {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
  animation: fadeDown 0.6s ease both;
}
.logo-icon {
  width: 48px; height: 48px;
  border: 1.5px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: var(--accent);
  position: relative;
}
.logo-icon::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(0,212,170,0.2);
}
.logo-name {
  font-family: var(--serif);
  font-size: 2.8rem;
  color: #fff;
  letter-spacing: 2px;
}
.logo-tag {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 48px;
  animation: fadeDown 0.6s 0.1s ease both;
}

.search-container {
  width: 100%;
  max-width: 620px;
  animation: fadeUp 0.6s 0.2s ease both;
}
.search-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.search-box {
  display: flex;
  border: 1px solid var(--border2);
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--accent); }
#tickerInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 16px 20px;
  font-family: var(--mono);
  font-size: 1.4rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: 3px;
  text-transform: uppercase;
}
#tickerInput::placeholder { color: var(--text3); font-size: 1rem; letter-spacing: 2px; font-weight: 400; }
#analyzeBtn {
  background: var(--accent);
  border: none;
  padding: 0 28px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #000;
  text-transform: uppercase;
  transition: background 0.15s, transform 0.1s;
}
#analyzeBtn:hover { background: #00f0c0; }
#analyzeBtn:active { transform: scale(0.98); }
#analyzeBtn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

.quick-tickers {
  margin-top: 18px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.quick-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.05); }

.features-row {
  margin-top: 60px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp 0.6s 0.3s ease both;
}
.feature-chip {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
}
.feature-chip span { color: var(--accent); }

/* ── LOADING ── */
#loadingScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.loader-ticker {
  font-family: var(--serif);
  font-size: 3rem;
  color: var(--accent);
  letter-spacing: 6px;
}
.loader-bar-wrap {
  width: 320px;
  height: 2px;
  background: var(--border);
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%;
  transition: width 0.4s ease;
}
.loader-status {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  min-height: 18px;
  text-align: center;
  max-width: 400px;
}
.loader-dots span {
  animation: blink 1.2s infinite;
  color: var(--accent);
}
.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ── DASHBOARD ── */
#dashboard {
  display: none;
  min-height: 100vh;
}

/* Topbar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-logo { font-family: var(--serif); font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }
.topbar-sep { width: 1px; height: 20px; background: var(--border2); }
.topbar-ticker { font-size: 1.4rem; font-weight: 600; color: #fff; letter-spacing: 3px; }
.topbar-company { font-size: 11px; color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-price { font-size: 1.5rem; font-weight: 600; color: #fff; }
.topbar-change { font-size: 12px; padding: 3px 8px; }
.change-pos { background: rgba(34,197,94,0.15); color: var(--green); }
.change-neg { background: rgba(239,68,68,0.12); color: var(--red); }
.change-neu { background: rgba(245,158,11,0.1); color: var(--gold); }
#newSearchBtn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
#newSearchBtn:hover { border-color: var(--accent); color: var(--accent); }

/* Dashboard content */
.dash-content {
  max-width: 1300px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

/* Section headers */
.section-hdr {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 36px 0 18px;
}
.section-hdr-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-hdr-text {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px 24px;
}
.card-title {
  font-size: 9px;
  letter-spacing: 2.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* KPI row */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}
.kpi-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 14px 16px;
  transition: border-color 0.15s;
}
.kpi-card:hover { border-color: var(--border2); }
.kpi-label { font-size: 9px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 1.3rem; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
.kpi-sub { font-size: 9px; color: var(--text3); margin-top: 3px; }
.kpi-pos { color: var(--green) !important; }
.kpi-neg { color: var(--red) !important; }
.kpi-neu { color: var(--gold) !important; }

/* Historical charts */
.hist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.bar-chart-wrap { }
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.bar-year { width: 38px; font-size: 9px; color: var(--text3); flex-shrink: 0; }
.bar-outer { flex: 1; height: 18px; background: var(--surface2); position: relative; overflow: hidden; }
.bar-inner { height: 100%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); position: relative; }
.bar-inner::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 2px; height: 100%;
  background: rgba(255,255,255,0.3);
}
.bar-val { width: 70px; text-align: right; font-size: 10px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.bar-pct { width: 48px; text-align: right; font-size: 9px; flex-shrink: 0; }

/* Executive Summary */
.exec-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.flag-section { }
.flag-title {
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.flag-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.flag-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  font-family: var(--sans);
}
.flag-icon { flex-shrink: 0; margin-top: 1px; }

/* DCF Section */
.dcf-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 16px;
}
.slider-stack { display: flex; flex-direction: column; gap: 14px; }
.slider-item { }
.slider-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.slider-label { font-size: 10px; color: var(--text2); }
.slider-val {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  min-width: 50px;
  text-align: right;
}
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  background: var(--border2);
  outline: none;
  cursor: pointer;
  border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  cursor: pointer;
  border-radius: 0;
  border: 2px solid var(--bg);
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* Result panel */
.result-panel { display: flex; flex-direction: column; gap: 14px; }

.iv-display {
  background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
  border: 1px solid var(--border2);
  padding: 22px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
.iv-item .iv-label { font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.iv-item .iv-val { font-size: 1.8rem; font-family: var(--serif); }
.iv-item .iv-sub { font-size: 9px; color: var(--text3); margin-top: 3px; }

/* MoS bar */
.mos-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 18px 22px;
}
.mos-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.mos-title { font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }
.mos-pct {
  font-size: 1.4rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.mos-bar-bg {
  height: 10px;
  background: var(--surface3);
  position: relative;
  margin-bottom: 8px;
  overflow: hidden;
}
.mos-bar-fill {
  height: 100%;
  transition: width 0.4s ease, background 0.3s;
  position: relative;
}
.mos-bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  height: 100%;
  width: 3px;
  background: rgba(255,255,255,0.5);
}
.mos-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text3); letter-spacing: 1px; }

/* Verdict */
.verdict-card {
  padding: 16px 20px;
  border-left: 3px solid;
  font-size: 12px;
  font-family: var(--sans);
  line-height: 1.6;
  transition: all 0.3s;
}
.verdict-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; }

/* DCF Table */
.dcf-table-wrap { overflow-x: auto; }
.dcf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10px;
}
.dcf-table th {
  background: var(--surface3);
  text-align: right;
  padding: 8px 10px;
  font-size: 9px;
  letter-spacing: 0.5px;
  color: var(--text3);
  font-weight: 500;
  white-space: nowrap;
}
.dcf-table th:first-child { text-align: left; }
.dcf-table td {
  text-align: right;
  padding: 7px 10px;
  border-bottom: 1px solid rgba(30,45,68,0.5);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dcf-table td:first-child { text-align: left; color: var(--text3); }
.dcf-table .phase-1 { color: var(--accent2); }
.dcf-table .phase-2 { color: var(--purple); }
.dcf-table tfoot td {
  border-top: 1px solid var(--border2);
  border-bottom: none;
  font-weight: 600;
  padding-top: 10px;
}
.dcf-table tfoot tr:last-child td { color: var(--accent); }

/* Sensitivity */
.sens-table-wrap { overflow-x: auto; }
.sens-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10px;
  text-align: center;
}
.sens-table th {
  background: var(--surface3);
  padding: 7px 12px;
  font-size: 9px;
  letter-spacing: 0.5px;
  color: var(--text3);
  font-weight: 500;
}
.sens-table td {
  padding: 7px 12px;
  border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
  transition: background 0.2s;
  font-size: 10px;
}
.sens-table td.base-cell {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  font-weight: 700;
}
.sens-green { background: rgba(34,197,94,0.15); color: var(--green); }
.sens-gold  { background: rgba(245,158,11,0.10); color: var(--gold); }
.sens-red   { background: rgba(239,68,68,0.10);  color: var(--red); }

/* Ratio table */
.ratio-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ratio-table th {
  text-align: right;
  font-size: 9px;
  letter-spacing: 0.5px;
  color: var(--text3);
  font-weight: 500;
  padding: 0 10px 8px;
}
.ratio-table th:first-child { text-align: left; }
.ratio-table td {
  text-align: right;
  padding: 7px 10px;
  border-top: 1px solid rgba(30,45,68,0.5);
  font-variant-numeric: tabular-nums;
}
.ratio-table td:first-child { text-align: left; color: var(--text2); }

/* Disclaimer */
.disclaimer {
  font-size: 10px;
  color: var(--text3);
  line-height: 1.7;
  padding: 16px 20px;
  border: 1px solid var(--border);
  margin-top: 32px;
  font-family: var(--sans);
}

/* Error state */
.error-box {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 20px 24px;
  color: var(--text2);
  font-size: 12px;
  line-height: 1.7;
  font-family: var(--sans);
}
.error-box strong { color: var(--red); display: block; margin-bottom: 8px; font-family: var(--mono); font-size: 11px; letter-spacing: 1px; }

/* Animations */
@keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
@keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: none; } }
@keyframes blink    { 0%,100% { opacity:1; } 50% { opacity:0; } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes slideIn  { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }

.dash-content > * { animation: slideIn 0.4s ease both; }
.dash-content > *:nth-child(1) { animation-delay: 0.05s; }
.dash-content > *:nth-child(2) { animation-delay: 0.10s; }
.dash-content > *:nth-child(3) { animation-delay: 0.15s; }
.dash-content > *:nth-child(4) { animation-delay: 0.20s; }
.dash-content > *:nth-child(5) { animation-delay: 0.25s; }
.dash-content > *:nth-child(6) { animation-delay: 0.30s; }

/* Responsive */
@media (max-width: 900px) {
  .dcf-layout { grid-template-columns: 1fr; }
  .exec-summary-grid { grid-template-columns: 1fr; }
  .hist-grid { grid-template-columns: 1fr; }
  .iv-display { grid-template-columns: 1fr 1fr; }
  .dash-content { padding: 20px 16px 60px; }
  .topbar { padding: 12px 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .logo-name { font-size: 2rem; }
  .iv-display { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<!-- ═══════════════════ LANDING ═══════════════════ -->
<div id="landingScreen">
  <div class="logo-wrap">
    <div class="logo-icon">◈</div>
    <div class="logo-name">ATLAS</div>
  </div>
  <div class="logo-tag">AI Equity Research Terminal · Powered by Claude</div>

  <div class="search-container">
    <div class="search-label">▸ Enter Ticker Symbol</div>
    <div class="search-box">
      <input type="text" id="tickerInput" placeholder="e.g. AAPL · MSFT · NOVO B · NESN" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      <button id="analyzeBtn" onclick="startAnalysis()">ANALYZE ▶</button>
    </div>
    <div class="quick-tickers">
      <button class="quick-btn" onclick="quickTicker('AAPL')">AAPL</button>
      <button class="quick-btn" onclick="quickTicker('MSFT')">MSFT</button>
      <button class="quick-btn" onclick="quickTicker('NVDA')">NVDA</button>
      <button class="quick-btn" onclick="quickTicker('AMZN')">AMZN</button>
      <button class="quick-btn" onclick="quickTicker('NOVO B')">NOVO B</button>
      <button class="quick-btn" onclick="quickTicker('SAP')">SAP</button>
      <button class="quick-btn" onclick="quickTicker('NESTE')">NESTE</button>
      <button class="quick-btn" onclick="quickTicker('SAMPO')">SAMPO</button>
    </div>
  </div>

  <div class="features-row">
    <div class="feature-chip"><span>◉</span> Live Financial Extraction</div>
    <div class="feature-chip"><span>◉</span> 2-Stage DCF Model</div>
    <div class="feature-chip"><span>◉</span> Margin of Safety</div>
    <div class="feature-chip"><span>◉</span> Sensitivity Analysis</div>
    <div class="feature-chip"><span>◉</span> AI-Generated Flags</div>
  </div>
</div>

<!-- ═══════════════════ LOADING ═══════════════════ -->
<div id="loadingScreen">
  <div class="loader-ticker" id="loaderTicker">AAPL</div>
  <div style="font-size:10px;letter-spacing:3px;color:var(--text3);margin-bottom:20px;">FETCHING FINANCIALS</div>
  <div class="loader-bar-wrap">
    <div class="loader-bar" id="loaderBar"></div>
  </div>
  <div class="loader-status" id="loaderStatus">
    Initializing<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>
  </div>
</div>

<!-- ═══════════════════ DASHBOARD ═══════════════════ -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">ATLAS</div>
      <div class="topbar-sep"></div>
      <div>
        <div class="topbar-ticker" id="tbTicker">—</div>
        <div class="topbar-company" id="tbCompany">—</div>
      </div>
    </div>
    <div class="topbar-right">
      <div>
        <div class="topbar-price" id="tbPrice">—</div>
        <div class="topbar-change" id="tbExchange" style="font-size:9px;color:var(--text3);text-align:right;"></div>
      </div>
      <div class="topbar-change" id="tbChange">—</div>
      <button id="newSearchBtn" onclick="resetToLanding()">⌫ NEW SEARCH</button>
    </div>
  </div>

  <div class="dash-content" id="dashContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  ticker: '',
  data: null,
};

let dcfParams = {
  baseFCF: 10,
  g1: 0.10,
  g2: 0.07,
  gterm: 0.025,
  wacc: 0.09,
  mos_req: 0.25,
  shares: 1,
  currentPrice: 100,
};

// ═══════════════════════════════════════════════
// LANDING
// ═══════════════════════════════════════════════
document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnalysis();
});
function quickTicker(t) {
  document.getElementById('tickerInput').value = t;
  startAnalysis();
}

function resetToLanding() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('landingScreen').style.display = 'flex';
  document.getElementById('tickerInput').value = '';
}

// ═══════════════════════════════════════════════
// ANALYSIS FLOW
// ═══════════════════════════════════════════════
async function startAnalysis() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;
  state.ticker = ticker;

  document.getElementById('landingScreen').style.display = 'none';
  showLoading(ticker);

  try {
    const result = await fetchFinancials(ticker);
    hideLoading();
    renderDashboard(result);
  } catch (err) {
    hideLoading();
    renderError(err.message || 'Unknown error occurred.');
  }
}

function showLoading(ticker) {
  const ls = document.getElementById('loadingScreen');
  ls.style.display = 'flex';
  document.getElementById('loaderTicker').textContent = ticker;
  document.getElementById('loaderBar').style.width = '0%';
  document.getElementById('loaderStatus').innerHTML = 'Connecting to data sources<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>';
}

function setProgress(pct, msg) {
  document.getElementById('loaderBar').style.width = pct + '%';
  document.getElementById('loaderStatus').innerHTML = msg + '<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>';
}

function hideLoading() {
  document.getElementById('loadingScreen').style.display = 'none';
}

// ═══════════════════════════════════════════════
// DATA NORMALIZER — fixes missing/misnamed fields
// ═══════════════════════════════════════════════
function normalizeData(d) {
  if (!d) throw new Error('No data returned from API.');

  // Ensure top-level fields
  d.ticker          = d.ticker          || state.ticker;
  d.company         = d.company         || d.ticker;
  d.exchange        = d.exchange        || '—';
  d.sector          = d.sector          || '—';
  d.currency        = d.currency        || 'USD';
  d.currentPrice    = +d.currentPrice   || 10;
  d.sharesOutstanding = +d.sharesOutstanding || 1;
  d.marketCap       = +d.marketCap      || (d.currentPrice * d.sharesOutstanding);
  d.description     = d.description     || 'No description available.';
  d.greenFlags      = Array.isArray(d.greenFlags) ? d.greenFlags : ['Data not available'];
  d.redFlags        = Array.isArray(d.redFlags)   ? d.redFlags   : ['Data not available'];
  d.analystComment  = d.analystComment  || 'No analyst comment available.';

  // Ensure financials object
  if (!d.financials || typeof d.financials !== 'object') d.financials = {};
  const f = d.financials;

  // Ensure years array (min 1 year)
  if (!Array.isArray(f.years) || f.years.length === 0) f.years = ['FY2024'];
  const N = f.years.length;

  // Helper: ensure array of numbers, length N, fallback value v
  const ensureArr = (arr, fallback) => {
    if (!Array.isArray(arr) || arr.length === 0) return Array(N).fill(fallback);
    // Pad or trim to N
    const out = arr.map(x => (x === null || x === undefined || isNaN(+x)) ? fallback : +x);
    while (out.length < N) out.push(out[out.length - 1] || fallback);
    return out.slice(0, N);
  };

  f.revenue           = ensureArr(f.revenue,           1);
  f.netIncome         = ensureArr(f.netIncome,          0.1);
  f.operatingCashFlow = ensureArr(f.operatingCashFlow,  0.1);
  f.capex             = ensureArr(f.capex,              0.05);
  f.totalAssets       = ensureArr(f.totalAssets,        1);
  f.totalEquity       = ensureArr(f.totalEquity || f.equity, 0.5); // fix: accept either key
  f.totalDebt         = ensureArr(f.totalDebt,          0);
  f.eps               = ensureArr(f.eps,                0.01);

  // Ensure dcfDefaults
  if (!d.dcfDefaults || typeof d.dcfDefaults !== 'object') d.dcfDefaults = {};
  const def = d.dcfDefaults;
  const latestFCF = Math.max((f.operatingCashFlow[N-1] - f.capex[N-1]), 0.01);
  def.baseFCF = +def.baseFCF || latestFCF;
  def.g1      = +def.g1      || 8;
  def.g2      = +def.g2      || 5;
  def.gterm   = +def.gterm   || 2.5;
  def.wacc    = +def.wacc    || 9;
  def.mos_req = +def.mos_req || 25;

  return d;
}

// ═══════════════════════════════════════════════
// CLAUDE API CALL
// ═══════════════════════════════════════════════
async function fetchFinancials(ticker) {
  setProgress(15, 'Sending request to Claude AI');

  const prompt = `You are a senior equity research analyst. Analyze stock ticker "${ticker}" and return financial data as a single JSON object.

CRITICAL RULES:
1. Return ONLY raw JSON. Absolutely no markdown fences, no backticks, no text before or after. The very first character must be { and the very last must be }.
2. Every array in "financials" MUST have EXACTLY the same length as "years". Do NOT skip or truncate any array.
3. All numeric values must be plain numbers (not strings, not null). Use 0 if truly unknown.
4. Financial values are in BILLIONS of the local currency, EXCEPT: currentPrice (per share), sharesOutstanding (billions), marketCap (billions), eps (per share).

JSON STRUCTURE — fill in real values for "${ticker}":
{"ticker":"${ticker}","company":"Full Legal Company Name","exchange":"Exchange name e.g. NASDAQ / NYSE / OMX Helsinki / LSE / XETRA","sector":"Sector","currency":"USD","currentPrice":150.00,"sharesOutstanding":5.5,"marketCap":825.0,"description":"2-3 sentence business overview.","financials":{"years":["FY2021","FY2022","FY2023","FY2024"],"revenue":[10.0,11.5,13.0,14.8],"netIncome":[1.5,1.8,2.1,2.4],"operatingCashFlow":[2.0,2.4,2.8,3.2],"capex":[0.5,0.6,0.7,0.8],"totalAssets":[20.0,22.0,24.0,26.0],"totalEquity":[8.0,9.0,10.0,11.0],"totalDebt":[4.0,4.5,5.0,5.5],"eps":[0.27,0.33,0.38,0.44]},"dcfDefaults":{"baseFCF":2.4,"g1":8,"g2":5,"gterm":2.5,"wacc":9.0,"mos_req":25},"greenFlags":["Specific green flag 1","Specific green flag 2","Specific green flag 3","Specific green flag 4"],"redFlags":["Specific red flag 1","Specific red flag 2","Specific red flag 3"],"analystComment":"2-3 sentence investment thesis and key risk summary."}

For "${ticker}" specifically:
- Use real historical data from your training knowledge (FY2021–FY2024 or latest available)
- dcfDefaults: baseFCF = latest operatingCashFlow minus latest capex; g1/g2/gterm/wacc/mos_req as plain percentage numbers
- If ticker is ambiguous (e.g. NOKIA.HE, NOK, NOKIA), use Nokia Corporation (NOK/NOKIA.HE, Finnish telecom/network equipment company)
- If completely unrecognized, still return valid JSON with best-effort estimates and note uncertainty in analystComment`;

  const response = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 3000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  setProgress(60, 'Processing financial statements');

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`API error ${response.status}: ${err.error?.message || response.statusText}`);
  }

  const apiData = await response.json();
  setProgress(80, 'Building valuation model');

  const raw = apiData.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');

  let parsed;
  try {
    // Strip any accidental markdown fences
    const clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    // Find outermost JSON object
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('No JSON object found in response');
    parsed = JSON.parse(clean.slice(start, end + 1));
  } catch (e) {
    throw new Error(`JSON parse failed: ${e.message}. Response preview: ${raw.slice(0, 300)}`);
  }

  // Normalize and validate all fields
  parsed = normalizeData(parsed);

  setProgress(95, 'Rendering dashboard');
  await new Promise(r => setTimeout(r, 300));
  return parsed;
}

// ═══════════════════════════════════════════════
// DCF MATH
// ═══════════════════════════════════════════════
function calcDCF(p) {
  const rows = [];
  let fcf = p.baseFCF;
  let totalPV = 0;
  for (let yr = 1; yr <= 10; yr++) {
    const g = yr <= 5 ? p.g1 : p.g2;
    fcf = fcf * (1 + g);
    const df = Math.pow(1 + p.wacc, yr);
    const pv = fcf / df;
    totalPV += pv;
    rows.push({ yr, phase: yr <= 5 ? 1 : 2, g, fcf, df, pv });
  }
  const termFCF = fcf * (1 + p.gterm);
  const termVal = termFCF / (p.wacc - p.gterm);
  const termPV  = termVal / Math.pow(1 + p.wacc, 10);
  const equity  = totalPV + termPV;
  const iv      = equity / p.shares;
  const mos     = (iv - p.currentPrice) / iv * 100;
  const tvPct   = termPV / equity * 100;
  return { rows, totalPV, termPV, termVal, equity, iv, mos, tvPct };
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderDashboard(d) {
  state.data = d;
  const fin = d.financials;
  const yrs = fin.years;
  const N = yrs.length;
  const cur = d.currency || 'USD';

  // Topbar
  document.getElementById('tbTicker').textContent = d.ticker;
  document.getElementById('tbCompany').textContent = d.company;
  document.getElementById('tbPrice').textContent = fmtPrice(d.currentPrice, cur);
  document.getElementById('tbExchange').textContent = d.exchange || '';
  document.getElementById('tbChange').textContent = d.sector || '';
  document.getElementById('tbChange').className = 'topbar-change change-neu';

  // DCF params
  const def = d.dcfDefaults || {};
  dcfParams = {
    baseFCF:     def.baseFCF    || (fin.operatingCashFlow[N-1] - fin.capex[N-1]),
    g1:          (def.g1        || 10) / 100,
    g2:          (def.g2        || 7)  / 100,
    gterm:       (def.gterm     || 2.5)/ 100,
    wacc:        (def.wacc      || 9)  / 100,
    mos_req:     (def.mos_req   || 25) / 100,
    shares:      d.sharesOutstanding || 1,
    currentPrice:d.currentPrice || 100,
  };

  // Compute historical metrics — all array accesses guarded
  const sa = (a, i) => (Array.isArray(a) && a[i] !== undefined && !isNaN(+a[i])) ? +a[i] : 0;
  const fcfs       = yrs.map((_, i) => sa(fin.operatingCashFlow, i) - sa(fin.capex, i));
  const margins    = yrs.map((_, i) => sa(fin.revenue,i)>0 ? sa(fin.netIncome,i)/sa(fin.revenue,i)*100 : 0);
  const roes       = yrs.map((_, i) => Math.max(sa(fin.totalEquity,i),0.001)>0 ? sa(fin.netIncome,i)/Math.max(sa(fin.totalEquity,i),0.001)*100 : 0);
  const fcfMargins = yrs.map((_, i) => sa(fin.revenue,i)>0 ? fcfs[i]/sa(fin.revenue,i)*100 : 0);
  const latestFCF  = fcfs[N-1] || 0;
  const _f0 = Math.abs(fcfs[0]) > 0.001 ? Math.abs(fcfs[0]) : 0.001;
  const fcfCAGR    = N > 1 ? (Math.pow(Math.abs(fcfs[N-1]||0.001)/_f0, 1/(N-1))-1)*(fcfs[N-1]>=0?100:-100) : 0;
  const revCAGR    = N > 1 && sa(fin.revenue,0)>0 ? (Math.pow(sa(fin.revenue,N-1)/sa(fin.revenue,0),1/(N-1))-1)*100 : 0;
  const debtEquity = Math.max(sa(fin.totalEquity,N-1),0.001) > 0 ? sa(fin.totalDebt,N-1)/Math.max(sa(fin.totalEquity,N-1),0.001) : 0;

  document.getElementById('dashboard').style.display = 'block';

  const c = document.getElementById('dashContent');
  c.innerHTML = `
    ${sectionHdr('Company Overview')}
    ${renderKPIs(d, fin, fcfs, margins, roes, fcfCAGR, revCAGR, debtEquity, cur, N)}

    ${sectionHdr('Historical Financials')}
    <div class="hist-grid">
      ${renderBarChart('Free Cash Flow', yrs, fcfs, cur, 'B', '#00d4aa')}
      ${renderBarChart('Net Income Margin', yrs, margins, '', '%', '#0091ff')}
      ${renderBarChart('Revenue', yrs, fin.revenue, cur, 'B', '#a855f7')}
      ${renderBarChart('Return on Equity (ROE)', yrs, roes, '', '%', '#f59e0b')}
    </div>

    ${sectionHdr('Key Ratios & Metrics')}
    ${renderRatioTable(yrs, fin, fcfs, margins, roes, fcfMargins, cur)}

    ${sectionHdr('Executive Summary')}
    ${renderExecSummary(d)}

    ${sectionHdr('Interactive DCF Valuation Model')}
    <div class="dcf-layout">
      <div class="card">
        <div class="card-title">Model Assumptions</div>
        <div class="slider-stack" id="sliderStack">
          ${renderSliders()}
        </div>
      </div>
      <div class="result-panel">
        <div class="iv-display" id="ivDisplay"></div>
        <div class="mos-card" id="mosCard"></div>
        <div id="verdictBox"></div>
      </div>
    </div>

    ${sectionHdr('10-Year FCF Projection')}
    <div class="card">
      <div class="card-title">Discounted Cash Flow Projections · ${cur} Billions</div>
      <div class="dcf-table-wrap">
        <table class="dcf-table"><thead><tr>
          <th>Year</th><th>Phase</th><th>Growth</th>
          <th>FCF (${cur}B)</th><th>Discount Factor</th><th>PV (${cur}B)</th>
        </tr></thead>
        <tbody id="dcfTbody"></tbody>
        <tfoot id="dcfTfoot"></tfoot></table>
      </div>
    </div>

    ${sectionHdr('Sensitivity Analysis')}
    <div class="card">
      <div class="card-title">Intrinsic Value per Share · WACC (Rows) vs Phase 1 Growth (Columns) · Current Price = ${fmtPrice(d.currentPrice, cur)}</div>
      <div class="sens-table-wrap" id="sensWrap"></div>
    </div>

    <div class="disclaimer">
      ⚠ ATLAS is an AI-powered educational tool. All financial data is sourced from Claude's training knowledge and may not reflect the most current figures. This dashboard does not constitute investment advice. DCF models are highly sensitive to assumptions — small changes in WACC or growth rates produce large changes in intrinsic value. Always verify data with official filings (SEC EDGAR, annual reports) and consult a qualified financial advisor before making investment decisions.
    </div>`;

  // Wire sliders
  ['baseFCF','g1','g2','gterm','wacc','mos_req'].forEach(k => {
    const el = document.getElementById('sl_' + k);
    if (el) el.addEventListener('input', () => {
      updateDCFParam(k, parseFloat(el.value));
    });
  });

  updateDCF();
}

function sectionHdr(title) {
  return `<div class="section-hdr"><div class="section-hdr-text">${title}</div><div class="section-hdr-line"></div></div>`;
}

function fmtPrice(v, cur) {
  const sym = cur === 'EUR' ? '€' : cur === 'GBP' ? '£' : cur === 'SEK' ? 'kr' : cur === 'DKK' ? 'kr' : '$';
  return sym + (v || 0).toFixed(2);
}
function fmtB(v, cur) {
  const sym = cur === 'EUR' ? '€' : cur === 'GBP' ? '£' : cur === 'SEK' ? 'kr' : cur === 'DKK' ? 'kr' : '$';
  if (Math.abs(v) >= 1000) return sym + (v/1000).toFixed(1) + 'T';
  return sym + v.toFixed(1) + 'B';
}
function colorClass(v, good='pos') {
  if (good === 'pos') return v > 0 ? 'kpi-pos' : v < 0 ? 'kpi-neg' : '';
  return v > 0 ? 'kpi-neg' : v < 0 ? 'kpi-pos' : '';
}

function renderKPIs(d, fin, fcfs, margins, roes, fcfCAGR, revCAGR, debtEquity, cur, N) {
  const sa2 = (a, i) => (Array.isArray(a) && a[i] !== undefined && !isNaN(+a[i])) ? +a[i] : 0;
  const latestFCF = fcfs[N-1] || 0;
  const fcfM = sa2(fin.revenue,N-1) > 0 ? latestFCF / sa2(fin.revenue,N-1) * 100 : 0;
  const latestROE = Math.max(sa2(fin.totalEquity,N-1),0.001) > 0 ? sa2(fin.netIncome,N-1)/Math.max(sa2(fin.totalEquity,N-1),0.001)*100 : 0;
  const epsLast = sa2(fin.eps, N-1);
  const pe = epsLast > 0 ? d.currentPrice / epsLast : null;
  const items = [
    { label:'Market Cap',     val: fmtB(d.marketCap||0, cur),     sub:'Latest',        cls:'' },
    { label:'Current Price',  val: fmtPrice(d.currentPrice, cur),  sub:d.exchange||'',  cls:'' },
    { label:'P/E Ratio',      val: pe ? pe.toFixed(1)+'x' : 'N/A', sub:'Price / EPS',   cls: pe > 30 ? 'kpi-neg' : pe < 15 ? 'kpi-pos' : 'kpi-neu' },
    { label:'Latest FCF',     val: fmtB(latestFCF, cur),           sub:'OCF − CapEx',   cls: latestFCF > 0 ? 'kpi-pos' : 'kpi-neg' },
    { label:'FCF Margin',     val: fcfM.toFixed(1)+'%',            sub:'FCF / Revenue', cls: fcfM > 15 ? 'kpi-pos' : fcfM > 5 ? 'kpi-neu' : 'kpi-neg' },
    { label:'Net Margin',     val: margins[N-1].toFixed(1)+'%',    sub:'Latest FY',     cls: margins[N-1]>15?'kpi-pos':margins[N-1]>5?'kpi-neu':'kpi-neg' },
    { label:'ROE',            val: latestROE.toFixed(1)+'%',       sub:'Latest FY',     cls: latestROE>15?'kpi-pos':latestROE>8?'kpi-neu':'kpi-neg' },
    { label:'Rev CAGR',       val: revCAGR.toFixed(1)+'%',         sub:`${state.data.financials.years[0]}–latest`, cls: revCAGR>10?'kpi-pos':revCAGR>3?'kpi-neu':'kpi-neg' },
    { label:'FCF CAGR',       val: fcfCAGR.toFixed(1)+'%',         sub:`${state.data.financials.years[0]}–latest`, cls: fcfCAGR>8?'kpi-pos':fcfCAGR>0?'kpi-neu':'kpi-neg' },
    { label:'Debt/Equity',    val: debtEquity.toFixed(2)+'x',      sub:'Total Debt/Eq', cls: debtEquity<0.5?'kpi-pos':debtEquity<1.5?'kpi-neu':'kpi-neg' },
    { label:'Latest EPS',     val: epsLast.toFixed(2),              sub:'Diluted',       cls: epsLast>0?'kpi-pos':'kpi-neg' },
    { label:'Shares Out.',    val: (d.sharesOutstanding||0).toFixed(2)+'B', sub:'Diluted billions', cls:'' },
  ];
  return `<div class="kpi-grid">${items.map(it => `
    <div class="kpi-card">
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-value ${it.cls}">${it.val}</div>
      <div class="kpi-sub">${it.sub}</div>
    </div>`).join('')}</div>
  <div class="card" style="margin-top:12px;">
    <div class="card-title">Business Description</div>
    <div style="font-size:12px;font-family:var(--sans);color:var(--text2);line-height:1.7;">${state.data.description || '—'}</div>
  </div>`;
}

function renderBarChart(title, yrs, vals, cur, unit, color) {
  const max = Math.max(...vals.map(Math.abs), 0.001);
  const sym = unit === 'B' ? (cur === 'EUR' ? '€' : cur === 'GBP' ? '£' : '$') : '';
  return `<div class="card">
    <div class="card-title">${title}</div>
    <div class="bar-chart-wrap">
    ${yrs.map((y, i) => {
      const v = vals[i];
      const pct = Math.abs(v) / max * 100;
      const prev = i > 0 ? vals[i-1] : null;
      const chg = prev !== null ? (v - prev) / Math.abs(prev) * 100 : null;
      const chgStr = chg !== null ? (chg >= 0 ? '+' : '') + chg.toFixed(1) + '%' : '';
      const chgColor = chg === null ? '' : chg >= 0 ? 'color:var(--green)' : 'color:var(--red)';
      const negBar = v < 0;
      return `<div class="bar-row">
        <div class="bar-year">${y.replace('FY','')}</div>
        <div class="bar-outer">
          <div class="bar-inner" style="width:${pct}%;background:${negBar?'var(--red)':color};opacity:0.75;"></div>
        </div>
        <div class="bar-val" style="color:${negBar?'var(--red)':color}">${sym}${Math.abs(v).toFixed(1)}${unit}</div>
        <div class="bar-pct" style="${chgColor}">${chgStr}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function renderRatioTable(yrs, fin, fcfs, margins, roes, fcfMargins, cur) {
  const rows = [
    { label: 'Revenue ('+cur+'B)',       vals: fin.revenue,          fmt: v => v.toFixed(1) },
    { label: 'Net Income ('+cur+'B)',    vals: fin.netIncome,        fmt: v => v.toFixed(1) },
    { label: 'FCF ('+cur+'B)',           vals: fcfs,                  fmt: v => v.toFixed(1) },
    { label: 'EPS',                      vals: fin.eps,               fmt: v => v.toFixed(2) },
    { label: 'Net Margin %',             vals: margins,               fmt: v => v.toFixed(1)+'%' },
    { label: 'FCF Margin %',             vals: fcfMargins,            fmt: v => v.toFixed(1)+'%' },
    { label: 'ROE %',                    vals: roes,                  fmt: v => v.toFixed(1)+'%' },
    { label: 'CapEx / Net Income %',     vals: yrs.map((_,i) => fin.capex[i]/Math.max(fin.netIncome[i],0.001)*100), fmt: v => v.toFixed(1)+'%' },
    { label: 'Total Debt ('+cur+'B)',    vals: fin.totalDebt   || Array(N).fill(0), fmt: v => v.toFixed(1) },
    { label: 'Total Equity ('+cur+'B)', vals: fin.totalEquity || Array(N).fill(0), fmt: v => v.toFixed(1) },
  ];
  return `<div class="card">
    <table class="ratio-table">
      <thead><tr><th style="text-align:left;">Metric</th>${yrs.map(y=>`<th>${y}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => {
        const n = r.vals.length;
        return `<tr><td>${r.label}</td>${r.vals.map((v,i) => {
          const prev = i > 0 ? r.vals[i-1] : null;
          const up = prev !== null && v > prev;
          const dn = prev !== null && v < prev;
          const col = up ? 'color:var(--green)' : dn ? 'color:var(--red)' : '';
          return `<td style="${col}">${r.fmt(v)}</td>`;
        }).join('')}</tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

function renderExecSummary(d) {
  const gf = (d.greenFlags || []).map(f => `<div class="flag-item"><div class="flag-icon" style="color:var(--green)">▲</div><div>${f}</div></div>`).join('');
  const rf = (d.redFlags   || []).map(f => `<div class="flag-item"><div class="flag-icon" style="color:var(--red)">▼</div><div>${f}</div></div>`).join('');
  return `<div class="exec-summary-grid">
    <div class="card">
      <div class="card-title">Green Flags · Bullish Indicators</div>
      <div class="flag-section">${gf}</div>
    </div>
    <div class="card">
      <div class="card-title">Red Flags · Risk Factors</div>
      <div class="flag-section">${rf}</div>
    </div>
  </div>
  <div class="card" style="margin-top:12px;">
    <div class="card-title">Analyst Commentary · Investment Thesis</div>
    <div style="font-size:12px;font-family:var(--sans);color:var(--text2);line-height:1.75;font-style:italic;">"${d.analystComment || '—'}"</div>
  </div>`;
}

function renderSliders() {
  const p = dcfParams;
  const sliders = [
    { id:'baseFCF', label:'Base FCF (latest FY)', min:0.1, max: Math.max(p.baseFCF*3,50), step:0.5, val:p.baseFCF, fmt: v => '$'+v.toFixed(1)+'B' },
    { id:'g1',  label:'FCF Growth Phase 1 (Yr 1–5)',  min:1, max:30,  step:0.5, val:p.g1*100,    fmt: v => v.toFixed(1)+'%' },
    { id:'g2',  label:'FCF Growth Phase 2 (Yr 6–10)', min:1, max:20,  step:0.5, val:p.g2*100,    fmt: v => v.toFixed(1)+'%' },
    { id:'gterm',label:'Terminal Growth Rate',         min:0.5,max:4,  step:0.25,val:p.gterm*100, fmt: v => v.toFixed(2)+'%' },
    { id:'wacc', label:'WACC (Discount Rate)',         min:5, max:15,  step:0.25,val:p.wacc*100,  fmt: v => v.toFixed(2)+'%' },
    { id:'mos_req',label:'Required Margin of Safety',  min:10,max:50,  step:5,   val:p.mos_req*100,fmt: v => v.toFixed(0)+'%' },
  ];
  return sliders.map(s => `
    <div class="slider-item">
      <div class="slider-label-row">
        <div class="slider-label">${s.label}</div>
        <div class="slider-val" id="sv_${s.id}">${s.fmt(s.val)}</div>
      </div>
      <input type="range" id="sl_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">
    </div>`).join('');
}

function updateDCFParam(key, rawVal) {
  const sliders = {
    baseFCF: v => { dcfParams.baseFCF = v; document.getElementById('sv_baseFCF').textContent = '$'+v.toFixed(1)+'B'; },
    g1:      v => { dcfParams.g1 = v/100; document.getElementById('sv_g1').textContent = v.toFixed(1)+'%'; },
    g2:      v => { dcfParams.g2 = v/100; document.getElementById('sv_g2').textContent = v.toFixed(1)+'%'; },
    gterm:   v => { dcfParams.gterm = v/100; document.getElementById('sv_gterm').textContent = v.toFixed(2)+'%'; },
    wacc:    v => { dcfParams.wacc = v/100; document.getElementById('sv_wacc').textContent = v.toFixed(2)+'%'; },
    mos_req: v => { dcfParams.mos_req = v/100; document.getElementById('sv_mos_req').textContent = v.toFixed(0)+'%'; },
  };
  if (sliders[key]) sliders[key](rawVal);
  updateDCF();
}

function updateDCF() {
  const p = dcfParams;
  const res = calcDCF(p);
  const cur = state.data?.currency || 'USD';
  const sym = cur === 'EUR' ? '€' : cur === 'GBP' ? '£' : cur === 'SEK' ? 'kr' : cur === 'DKK' ? 'kr' : '$';

  // IV display
  const ivCol = res.mos > 20 ? 'var(--green)' : res.mos > 0 ? 'var(--gold)' : 'var(--red)';
  document.getElementById('ivDisplay').innerHTML = `
    <div class="iv-item">
      <div class="iv-label">Intrinsic Value / Share</div>
      <div class="iv-val" style="color:${ivCol}">${sym}${res.iv.toFixed(2)}</div>
      <div class="iv-sub">TV = ${res.tvPct.toFixed(0)}% of total</div>
    </div>
    <div class="iv-item">
      <div class="iv-label">Current Price</div>
      <div class="iv-val" style="color:var(--text)">${fmtPrice(p.currentPrice, cur)}</div>
      <div class="iv-sub">${state.data?.exchange || 'Market price'}</div>
    </div>
    <div class="iv-item">
      <div class="iv-label">Total Equity Value</div>
      <div class="iv-val" style="color:var(--accent2)">${sym}${res.equity.toFixed(0)}B</div>
      <div class="iv-sub">÷ ${p.shares.toFixed(2)}B shares</div>
    </div>`;

  // MoS bar
  const barPct = Math.min(Math.max(50 + res.mos * 1.2, 3), 97);
  const barCol = res.mos >= p.mos_req*100 ? 'var(--green)' : res.mos > 0 ? 'var(--gold)' : 'var(--red)';
  document.getElementById('mosCard').innerHTML = `
    <div class="mos-header">
      <div class="mos-title">Margin of Safety</div>
      <div class="mos-pct" style="color:${barCol}">${(res.mos >= 0 ? '+' : '')}${res.mos.toFixed(1)}%</div>
    </div>
    <div class="mos-bar-bg">
      <div class="mos-bar-fill" style="width:${barPct}%;background:${barCol};"></div>
    </div>
    <div class="mos-labels"><span>OVERVALUED ◀</span><span>Required: ${(p.mos_req*100).toFixed(0)}%</span><span>▶ UNDERVALUED</span></div>`;

  // Verdict
  const vEl = document.getElementById('verdictBox');
  let vClass, vTitle, vText, vBorder;
  if (res.mos >= p.mos_req * 100) {
    vClass='verdict-card'; vBorder='var(--green)';
    vTitle=`<span style="color:var(--green)">✓ BUY ZONE — Margin of Safety Satisfied (${res.mos.toFixed(1)}% ≥ ${(p.mos_req*100).toFixed(0)}%)</span>`;
    vText=`At current assumptions, ${state.data?.ticker} trades at a ${res.mos.toFixed(1)}% discount to intrinsic value of ${sym}${res.iv.toFixed(2)}, exceeding the required ${(p.mos_req*100).toFixed(0)}% MoS threshold. The implied buy target (IV × (1−MoS)) is <strong>${sym}${(res.iv*(1-p.mos_req)).toFixed(2)}</strong> or below.`;
  } else if (res.mos > 0) {
    vClass='verdict-card'; vBorder='var(--gold)';
    vTitle=`<span style="color:var(--gold)">~ NEUTRAL ZONE — Upside Present but MoS Not Met (${res.mos.toFixed(1)}% < ${(p.mos_req*100).toFixed(0)}%)</span>`;
    vText=`The stock appears modestly undervalued at ${res.mos.toFixed(1)}%, but falls short of the ${(p.mos_req*100).toFixed(0)}% safety buffer. A ${(p.mos_req*100).toFixed(0)}%-MoS buy target implies a price of <strong>${sym}${(res.iv*(1-p.mos_req)).toFixed(2)}</strong> — requiring a ${((p.currentPrice-(res.iv*(1-p.mos_req)))/p.currentPrice*100).toFixed(0)}% price decline from current levels.`;
  } else {
    vClass='verdict-card'; vBorder='var(--red)';
    vTitle=`<span style="color:var(--red)">✗ OVERVALUED — Stock Trades Above Intrinsic Value (${res.mos.toFixed(1)}%)</span>`;
    vText=`Under current assumptions, ${state.data?.ticker} is overvalued by ${Math.abs(res.mos).toFixed(1)}% relative to its DCF-derived intrinsic value of ${sym}${res.iv.toFixed(2)}. The market is pricing in more optimistic assumptions than modeled. Adjust growth rates or WACC to stress-test the thesis.`;
  }
  vEl.className = vClass;
  vEl.style.borderLeftColor = vBorder;
  vEl.style.background = vBorder === 'var(--green)' ? 'rgba(34,197,94,0.05)' : vBorder === 'var(--gold)' ? 'rgba(245,158,11,0.05)' : 'rgba(239,68,68,0.05)';
  vEl.innerHTML = `<div class="verdict-title">${vTitle}</div><div style="font-family:var(--sans);font-size:12px;color:var(--text2);line-height:1.65;">${vText}</div>`;

  // DCF Table
  const tbody = document.getElementById('dcfTbody');
  if (tbody) {
    tbody.innerHTML = res.rows.map(r => `<tr>
      <td>Year ${r.yr}</td>
      <td class="phase-${r.phase}" style="font-size:9px;letter-spacing:1px;">PHASE ${r.phase}</td>
      <td>${(r.g*100).toFixed(1)}%</td>
      <td class="phase-${r.phase}">${sym}${r.fcf.toFixed(2)}B</td>
      <td style="color:var(--text3);">÷ ${r.df.toFixed(3)}</td>
      <td style="color:var(--text2);">${sym}${r.pv.toFixed(2)}B</td>
    </tr>`).join('');
    document.getElementById('dcfTfoot').innerHTML = `
      <tr><td colspan="5" style="color:var(--text3);font-size:9px;">Sum PV (Years 1–10)</td><td>${sym}${res.totalPV.toFixed(2)}B</td></tr>
      <tr><td colspan="3" style="color:var(--text3);font-size:9px;">Terminal Value (Gordon Growth)</td><td class="phase-1">${sym}${res.termVal.toFixed(0)}B</td><td style="color:var(--text3);font-size:9px;">PV:</td><td style="color:var(--accent2);">${sym}${res.termPV.toFixed(2)}B</td></tr>
      <tr><td colspan="5">Total Equity Value</td><td>${sym}${res.equity.toFixed(2)}B</td></tr>
      <tr><td colspan="5">÷ ${p.shares.toFixed(2)}B Shares Outstanding</td><td>${sym}${res.iv.toFixed(2)} / share</td></tr>`;
  }

  // Sensitivity
  const sensWrap = document.getElementById('sensWrap');
  if (sensWrap) {
    const waccRange = [0.07, 0.08, 0.085, 0.09, 0.095, 0.10, 0.11];
    const g1Range   = [0.05, 0.07, 0.09, 0.10, 0.12, 0.15, 0.18];
    let html = `<table class="sens-table"><thead><tr>
      <th>WACC \\ G₁</th>${g1Range.map(g => `<th>${(g*100).toFixed(0)}%</th>`).join('')}
    </tr></thead><tbody>`;
    waccRange.forEach(w => {
      html += `<tr><td style="color:var(--text3);font-size:9px;letter-spacing:0.5px;">${(w*100).toFixed(1)}%</td>`;
      g1Range.forEach(g => {
        const r2 = calcDCF({ ...p, wacc: w, g1: g });
        const iv2 = r2.iv;
        const diff = (iv2 - p.currentPrice) / p.currentPrice * 100;
        const cls  = diff > 15 ? 'sens-green' : diff < -5 ? 'sens-red' : 'sens-gold';
        const isBase = Math.abs(w - p.wacc) < 0.001 && Math.abs(g - p.g1) < 0.001;
        html += `<td class="${cls}${isBase ? ' base-cell' : ''}">${sym}${iv2.toFixed(0)}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    sensWrap.innerHTML = html;
  }
}

function renderError(msg) {
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('tbTicker').textContent = state.ticker;
  document.getElementById('tbCompany').textContent = 'Analysis Failed';
  document.getElementById('tbPrice').textContent = '—';
  document.getElementById('tbChange').textContent = '';
  document.getElementById('dashContent').innerHTML = `
    <div style="margin-top:40px;" class="error-box">
      <strong>⚠ ANALYSIS ERROR</strong>
      ${msg}<br><br>
      Possible causes: Invalid ticker symbol, API connectivity issue, or unrecognized company.
      Try a well-known ticker like AAPL, MSFT, NVDA, or AMZN.
    </div>`;
}
